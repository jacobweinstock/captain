name: For each commit and PR
on:
  push:
    branches:
      - "**"
    tags:
      - "v**"
  pull_request:

env:
  KERNEL_VERSION: "6.12.69"
  MKOSI_MODE: native

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    env:
      ARCH: ${{ matrix.arch }}
      KERNEL_MODE: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ---------------------------------------------------------------
      # Docker builder image cache (only used when KERNEL_MODE=docker)
      # Uses the GitHub Actions cache backend (type=gha) so Buildx
      # reads/writes layers directly — no separate actions/cache step
      # or local-cache rotation needed.
      # https://docs.docker.com/build/cache/backends/gha/
      # ---------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Load the built image into the local Docker daemon so
          # subsequent steps can use it via `docker run captainos-builder`.
          load: true
          tags: captainos-builder
          # Pull cached layers from the GHA cache (scope avoids
          # collisions with other caches in this workflow).
          cache-from: type=gha,scope=builder
          # Push all layers (mode=max) back to the GHA cache so
          # subsequent runs can skip unchanged build stages.
          cache-to: type=gha,scope=builder,mode=max

      # ---------------------------------------------------------------
      # Kernel cache  (vmlinuz + modules)
      # Key inputs: kernel version, defconfig, build logic, Dockerfile
      # (compiler toolchain).
      # ---------------------------------------------------------------
      - name: Cache kernel build
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: |
            mkosi.output/kernel/usr/lib/modules
            mkosi.output/vmlinuz
          key: kernel-${{ matrix.arch }}-${{ env.KERNEL_VERSION }}-${{ hashFiles('config/defconfig.*', 'captain/kernel.py', 'Dockerfile') }}

      # ---------------------------------------------------------------
      # Tools cache  (containerd, runc, nerdctl, CNI plugins)
      # Key inputs: tool versions/URLs pinned in tools.py, architecture.
      # ---------------------------------------------------------------
      - name: Cache tools
        id: tools-cache
        uses: actions/cache@v4
        with:
          path: |
            mkosi.output/kernel/usr/local/bin
            mkosi.output/kernel/opt/cni
          key: tools-${{ matrix.arch }}-${{ hashFiles('captain/tools.py') }}

      # ---------------------------------------------------------------
      # Build kernel + download tools (skips mkosi).
      # Honors KERNEL_MODE — docker, native, or skip.
      # The build script auto-skips kernel if modules dir exists (cache
      # hit) and auto-skips each tool if its binary exists (cache hit).
      # ---------------------------------------------------------------
      - name: Build kernel and download tools
        run: |
          MKOSI_MODE=skip ./build.py build

      # ---------------------------------------------------------------
      # Fix ownership — Docker containers create files as root; mkosi
      # running natively needs the current user to own them.
      # ---------------------------------------------------------------
      - name: Fix output file ownership
        run: |
          sudo chown -R "$(id -u):$(id -g)" mkosi.output/

      # ---------------------------------------------------------------
      # mkosi — always runs (depends on mkosi.conf, mkosi.finalize,
      # mkosi.extra/*, packages, etc. which change frequently).
      # ---------------------------------------------------------------
      - name: setup-mkosi
        uses: systemd/mkosi@v26

      - name: Build initramfs
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          # The mkosi action removes AppArmor, but Docker still tries to apply
          # profiles from before the removal.  Restart the daemon so it notices.
          sudo systemctl restart docker
          # Skip kernel/tools stages — they are already built above.
          KERNEL_MODE=skip ./build.py build